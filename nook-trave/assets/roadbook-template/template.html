<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root{--paper:#ece3d5;--page:#fffaf1;--ink:#161616;--muted:#716a5e;--line:rgba(22,22,22,.14);--gold:#b68a45;--blue:#1e647c;--brick:#b5543d;--serif:"Noto Serif SC","Source Han Serif SC","Songti SC",SimSun,serif;--sans:"Inter","Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;--shadow:0 22px 70px rgba(31,26,18,.16)}
    *{box-sizing:border-box}html{background:var(--paper)}body{margin:0;color:var(--ink);font-family:var(--sans);line-height:1.68;background:radial-gradient(circle at 70% 0,rgba(30,100,124,.12),transparent 34%),var(--paper)}img{display:block;max-width:100%}.shell{width:min(100%,560px);margin:0 auto;padding:18px 12px 36px}.page{background:var(--page);box-shadow:var(--shadow);border:1px solid rgba(22,22,22,.08);margin:0 0 18px;overflow:hidden}.cover{min-height:820px;position:relative;color:white;background:#111}.cover>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.95) contrast(1.02)}.cover:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,10,.24),rgba(8,10,10,.20) 34%,rgba(8,10,10,.78)),linear-gradient(90deg,rgba(8,10,10,.56),rgba(8,10,10,.04))}.cover-content{position:relative;z-index:1;min-height:820px;padding:32px 28px;display:flex;flex-direction:column;justify-content:space-between}.masthead{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,.34);padding-bottom:14px}.brand{font-family:var(--serif);font-size:34px;font-weight:900;line-height:1}.issue{text-align:right;font-size:12px;line-height:1.5;color:rgba(255,255,255,.76);font-weight:800;letter-spacing:.08em;text-transform:uppercase}.kicker{width:max-content;max-width:100%;border:1px solid rgba(255,255,255,.38);padding:7px 10px;font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,255,255,.10);backdrop-filter:blur(10px)}h1{font-family:var(--serif);font-size:58px;line-height:.96;letter-spacing:0;margin:18px 0 14px;text-wrap:balance}.subtitle{font-size:18px;color:rgba(255,255,255,.86);max-width:430px}.cover-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.stat{border-top:1px solid rgba(255,255,255,.38);padding-top:10px;min-height:78px}.stat b{display:block;font-family:var(--serif);font-size:28px;line-height:1}.stat span{font-size:12px;color:rgba(255,255,255,.72);font-weight:800}.content{padding:26px}.label{color:var(--gold);font-size:11px;font-weight:950;letter-spacing:.16em;text-transform:uppercase}.head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}.folio{font-family:var(--serif);font-size:44px;font-weight:900;color:rgba(22,22,22,.18);line-height:1}h2{font-family:var(--serif);font-size:34px;line-height:1.12;letter-spacing:0;margin:6px 0 0}h3{font-family:var(--serif);font-size:28px;line-height:1.16;letter-spacing:0;margin:0 0 12px}p{margin:0 0 12px}.lead{font-size:17px;color:#34312c}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.info{border:1px solid var(--line);background:#fff7e9;padding:13px;min-height:96px}.info b{display:block;font-family:var(--serif);font-size:24px;line-height:1.05;color:var(--blue);margin:5px 0}.info span{display:block;color:var(--muted);font-size:12px;font-weight:800}.photo{height:430px;object-fit:cover;width:100%;border-bottom:1px solid var(--line);background:#ddd}.caption{padding:10px 14px;background:#161616;color:rgba(255,255,255,.78);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.day-title{padding:22px 22px 16px}.chips{display:flex;flex-wrap:wrap;gap:7px;margin:13px 0 0}.chip{border:1px solid var(--line);background:rgba(182,138,69,.10);color:#5f4827;padding:5px 8px;font-size:12px;font-weight:900}.facts{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.fact{padding:12px 8px;text-align:center;border-right:1px solid var(--line)}.fact:last-child{border-right:0}.fact b{display:block;font-family:var(--serif);font-size:20px;line-height:1;color:var(--blue)}.fact span{display:block;margin-top:5px;font-size:11px;color:var(--muted);font-weight:800}.timeline{padding:20px 22px 24px;display:grid;gap:12px}.time-row{display:grid;grid-template-columns:62px minmax(0,1fr);gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px}.time-row:last-child{border-bottom:0;padding-bottom:0}.time{font-weight:950;color:var(--brick)}.time-row b{font-weight:950}.note{margin:0 22px 22px;background:#161616;color:white;padding:18px}.note h4{font-family:var(--serif);font-size:24px;line-height:1.15;margin:0 0 10px}.note p{color:rgba(255,255,255,.76)}.list{display:grid;gap:12px}.list-item{display:grid;grid-template-columns:34px minmax(0,1fr);gap:12px;padding-bottom:12px;border-bottom:1px solid var(--line)}.list-item:last-child{border-bottom:0}.num{width:28px;height:28px;display:grid;place-items:center;background:var(--ink);color:white;font-size:12px;font-weight:950}.table{width:100%;border-collapse:collapse;font-size:13px;background:#fff7e9}.table th,.table td{border:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}.table th{background:#eadfca;font-weight:950}.mark{color:var(--brick);font-weight:950}.footer{padding:20px 26px 28px;text-align:center;color:var(--muted);font-size:12px}@media(max-width:420px){.shell{padding:0}.page{margin:0 0 12px;border-left:0;border-right:0;box-shadow:none}.cover,.cover-content{min-height:100svh}.cover-content{padding:24px 20px}.brand{font-size:28px}.issue{font-size:10px}h1{font-size:48px}.subtitle{font-size:16px}.content{padding:22px 18px}.photo{height:390px}.facts{grid-template-columns:repeat(2,minmax(0,1fr))}.fact:nth-child(2){border-right:0}.fact:nth-child(-n+2){border-bottom:1px solid var(--line)}.grid2{grid-template-columns:1fr}}@media print{body{background:white}.shell{width:100%;padding:0}.page{margin:0;box-shadow:none;border:0;break-after:page}}
  </style>
</head>
<body>
  <div class="shell">
    {{COVER}}
    {{OVERVIEW}}
    {{DAYS}}
    {{APPENDIX}}
  </div>
</body>
</html>

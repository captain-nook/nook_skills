<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nook-card preview shell</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f9f8;
        font-family: Arial, sans-serif;
      }

      .shell {
        width: min(90vw, 960px);
        aspect-ratio: 4 / 5;
        border: 10px solid #010101;
        border-radius: 48px;
        background:
          radial-gradient(rgba(1, 1, 1, 0.055) 1.5px, transparent 1.5px) 0 0 / 28px 28px,
          #fffffd;
        box-shadow: 32px 36px 0 #0b0b0b;
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="nook-card preview shell"></main>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">nook-slides workflow</title>
  <desc id="desc">A workflow diagram showing intake, content gate, page-form gate, visual system, asset plan, deck plan, renderer, and validation.</desc>
  <rect width="1280" height="520" fill="#f7f3e8"/>
  <rect x="34" y="34" width="1212" height="452" rx="28" fill="#fffaf0" stroke="#171717" stroke-width="4"/>
  <text x="72" y="92" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#171717">nook-slides</text>
  <text x="72" y="132" font-family="Arial, sans-serif" font-size="22" fill="#4b5563">先确认，再填空；先锁文字，再生成 PPT</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#171717">
    <rect x="72" y="190" width="126" height="78" rx="14" fill="#fff" stroke="#171717" stroke-width="3"/>
    <text x="100" y="237">Intake</text>
    <rect x="230" y="190" width="140" height="78" rx="14" fill="#d8ecff" stroke="#171717" stroke-width="3"/>
    <text x="258" y="225">Gate 1</text>
    <text x="250" y="250" font-size="15" font-weight="600">内容确认</text>
    <rect x="402" y="190" width="150" height="78" rx="14" fill="#ffd8ea" stroke="#171717" stroke-width="3"/>
    <text x="430" y="225">Gate 2</text>
    <text x="420" y="250" font-size="15" font-weight="600">页型 + 锁字</text>
    <rect x="584" y="190" width="150" height="78" rx="14" fill="#ffeab0" stroke="#171717" stroke-width="3"/>
    <text x="608" y="225">Gate 3</text>
    <text x="604" y="250" font-size="15" font-weight="600">视觉系统</text>
    <rect x="766" y="190" width="150" height="78" rx="14" fill="#e4f8d8" stroke="#171717" stroke-width="3"/>
    <text x="790" y="225">Gate 4</text>
    <text x="794" y="250" font-size="15" font-weight="600">资产计划</text>
    <rect x="948" y="190" width="132" height="78" rx="14" fill="#fff" stroke="#171717" stroke-width="3"/>
    <text x="970" y="225">Plan</text>
    <text x="964" y="250" font-size="15" font-weight="600">JSON 填空</text>
    <rect x="1112" y="190" width="96" height="78" rx="14" fill="#171717" stroke="#171717" stroke-width="3"/>
    <text x="1130" y="237" fill="#fff">PPTX</text>
  </g>
  <g stroke="#171717" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200 229h26"/>
    <path d="M370 229h28"/>
    <path d="M552 229h28"/>
    <path d="M734 229h28"/>
    <path d="M916 229h28"/>
    <path d="M1080 229h28"/>
    <path d="M220 217l12 12-12 12"/>
    <path d="M392 217l12 12-12 12"/>
    <path d="M574 217l12 12-12 12"/>
    <path d="M756 217l12 12-12 12"/>
    <path d="M938 217l12 12-12 12"/>
    <path d="M1102 217l12 12-12 12"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#171717">
    <rect x="230" y="320" width="322" height="92" rx="16" fill="#fff" stroke="#171717" stroke-width="3"/>
    <text x="254" y="354" font-weight="700">选择题优先</text>
    <text x="254" y="384">Intake 每轮最多 3 问</text>
    <rect x="584" y="320" width="332" height="92" rx="16" fill="#fff" stroke="#171717" stroke-width="3"/>
    <text x="608" y="354" font-weight="700">Gate 2 后文字冻结</text>
    <text x="608" y="384">后续只填 schema，不再改字</text>
    <rect x="948" y="320" width="260" height="92" rx="16" fill="#fff" stroke="#171717" stroke-width="3"/>
    <text x="972" y="354" font-weight="700">确定性校验</text>
    <text x="972" y="384">state / plan / deck</text>
  </g>
</svg>
